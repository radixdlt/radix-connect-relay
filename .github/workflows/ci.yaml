name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  release:
    types:
      - prereleased # A release was created and identified as a pre-release.
      - released # A release was published, or a pre-release was changed to a release.

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write
  pull-requests: write
  contents: read
  deployments: write
  packages: write

jobs:
  setup-tags:
    name: "Setup tags"
    runs-on: ubuntu-latest
    steps:
      - uses: RDXWorks-actions/checkout@main
      - name: Docker tags
        id: tags
        uses: RDXWorks-actions/metadata-action@master
        with:
          images: |
            docker.io/radixdlt/radix-connect-relay
          tags: |
            type=sha,event=pr
            type=sha,event=branch
            type=semver,pattern={{version}}
    outputs:
      tags: ${{ steps.tags.outputs.tags }}
      labels: ${{ steps.tags.outputs.labels }}
      json: ${{ steps.tags.outputs.json }}

  build:
    name: "Build"
    runs-on: ubuntu-latest
    needs:
      - setup-tags
    steps:
      - uses: RDXWorks-actions/checkout@main

      - name: Use bun
        uses: oven-sh/setup-bun@4bc047ad259df6fc24a6c9b0f9a0cb08cf17fbe5
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build --target=bun

      - name: Unit tests
        run: bun test --timeout=30000

  push-docker-image:
    name: Docker
    uses: radixdlt/public-iac-resuable-artifacts/.github/workflows/docker-build.yml@main
    with:
      runs_on: ubuntu-latest
      image_registry: "docker.io"
      image_organization: "radixdlt"
      image_name: "radix-connect-relay"
      tags: |
        type=sha,event=pr
        type=sha,event=branch
        type=semver,pattern={{version}}
      context: "."
      dockerfile: "Dockerfile"
      platforms: "linux/amd64"
      scan_image: true
      provenance: false
      snyk_target_ref: ${{ github.ref_name }}
      with_sbom: false

  deploy-pull-request:
    if: ${{ github.event.pull_request }}
    name: "Deploy PR"
    uses: radixdlt/public-iac-resuable-artifacts/.github/workflows/jenkins-deployment.yml@main
    needs:
      - setup-tags
      - push-docker-image
    with:
      jenkins_job_name: "kubernetes-deployments/job/radix-connect-relay"
      github_branch: "${{ github.head_ref }}"
      application_name: "radix-connect-relay"
      hierarchical_namespace: "radix-connect-relay-ci-pr"
      create_subnamespace: "true"
      kubernetes_namespace: "radix-connect-relay-pr-${{ github.event.number }}"
      aws_eks_cluster: "rdx-works-main-dev"
      aws_iam_role_name: "jenkins-radix-connect-relay-pr-deployer"
      helmfile_environment: "pr"
      helmfile_extra_vars: >-
        ci.tag=${{ fromJSON(needs.setup-tags.outputs.json).labels['org.opencontainers.image.version'] }},
        ci.prNumber=${{ github.event.number }},
        ci.environment=pr
    secrets:
      aws_deployment_account_id: ${{ secrets.AWS_DEV_ACCOUNT_ID }}
      secrets_account_id: ${{ secrets.SECRETS_ACCOUNT_ID }}

  deploy-dev:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    name: "Deploy DEV"
    uses: radixdlt/public-iac-resuable-artifacts/.github/workflows/jenkins-deployment.yml@main
    needs:
      - setup-tags
      - push-docker-image
    with:
      jenkins_job_name: "kubernetes-deployments/job/radix-connect-relay"
      github_branch: "${{ github.ref }}"
      application_name: "radix-connect-relay"
      hierarchical_namespace: "radix-connect-relay-dev"
      create_subnamespace: "false"
      kubernetes_namespace: "radix-connect-relay-dev"
      aws_eks_cluster: "rdx-works-main-dev"
      aws_iam_role_name: "jenkins-radix-connect-relay-dev-deployer"
      helmfile_environment: "dev"
      helmfile_extra_vars: >-
        ci.tag=${{ fromJSON(needs.setup-tags.outputs.json).labels['org.opencontainers.image.version'] }},
        ci.environment=dev,
        ci.HF_CREATE_NAMESPACES=false
    secrets:
      aws_deployment_account_id: ${{ secrets.AWS_DEV_ACCOUNT_ID }}
      secrets_account_id: ${{ secrets.SECRETS_ACCOUNT_ID }}

  deploy-prod:
    if: github.event_name == 'release' && github.event.action == 'released'
    name: "Deploy PROD"
    uses: radixdlt/public-iac-resuable-artifacts/.github/workflows/jenkins-deployment.yml@main
    needs:
      - setup-tags
      - push-docker-image
    with:
      github_environment: "prod"
      github_branch: "${{ github.ref }}"
      jenkins_job_name: "kubernetes-deployments/job/radix-connect-relay"
      application_name: "radix-connect-relay"
      kubernetes_namespace: "radix-connect-relay-prod"
      aws_eks_cluster: "rtlj-prod"
      aws_iam_role_name: "jenkins-radix-connect-relay-prod-deployer"
      helmfile_environment: "prod"
      helmfile_extra_vars: >-
        ci.tag=${{ fromJSON(needs.setup-tags.outputs.json).labels['org.opencontainers.image.version'] }},
        ci.environment=prod,
        ci.HF_CREATE_NAMESPACES=false
    secrets:
      aws_deployment_account_id: ${{ secrets.AWS_PROD_ACCOUNT_ID }}
      secrets_account_id: ${{ secrets.SECRETS_ACCOUNT_ID }}
